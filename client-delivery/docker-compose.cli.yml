# RL Gym Harness - CLI Version
# This docker-compose file is for CLI-only deployment (no frontend)

services:
  # FastAPI Backend Application
  fastapi-app:
    image: rl-gym-harness-fastapi:latest
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    environment:
      - DEBUG=false
      - DOCKER_CONTAINER=true
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/harness_main_aws
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - ALLOWED_ORIGINS=http://localhost:3000,http://localhost:8080,http://localhost:8501,http://localhost:8503
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_ORG=${OPENAI_ORG}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - SECRET_KEY=any-key-you-want
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=30
      - DISABLE_AUTH=true
      - RESULTS_DIR=/app/results
      # v2 Task Runner settings
      - USE_UNIFIED_RUNNER=true
      - MAX_STEPS_LIMIT=${MAX_STEPS_LIMIT:-400}
    volumes:
      - ./results:/app/results
      - ./logs:/app/logs
      - ./task_sheets:/app/task_sheets
      - ./reports:/app/reports
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app-network
    restart: unless-stopped

  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=harness_main_aws
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # ⚠️ SECURITY WARNING: Port exposed for client delivery only
    # In production: REMOVE this port binding or restrict with firewall
    ports:
      - "5432:5432"
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d harness_main_aws"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis for caching and Celery
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Celery Worker
  celery-worker:
    image: rl-gym-harness-fastapi:latest
    env_file:
      - deployment.config
    command: celery -A app.celery_app worker --loglevel=info --concurrency=${CELERY_WORKER_CONCURRENCY:-10} --queues=celery,monitoring,cleanup,batch_dispatch
    environment:
      - DOCKER_CONTAINER=true
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/harness_main_aws
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_ORG=${OPENAI_ORG}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - SECRET_KEY=any-key-you-want
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=30
      - DISABLE_AUTH=true
      - RESULTS_DIR=/app/results
      # v2 Task Runner settings
      - USE_UNIFIED_RUNNER=true
      - CUA_SCREENSHOT_TIMEOUT_MS=60000
      - MAX_STEPS_LIMIT=${MAX_STEPS_LIMIT:-400}
      - FIREFOX_CLEANUP_BUFFER_MINUTES=${FIREFOX_CLEANUP_BUFFER_MINUTES:-10}
    volumes:
      - ./results:/app/results
      - ./logs:/app/logs
      - ./task_sheets:/app/task_sheets
      - ./reports:/app/reports
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      fastapi-app:
        condition: service_started
    networks:
      - app-network
    restart: unless-stopped

  # Celery Beat Scheduler (for automated tasks and continuous monitoring)
  celery-beat:
    image: rl-gym-harness-fastapi:latest
    command: celery -A app.celery_app beat --loglevel=info
    environment:
      - DOCKER_CONTAINER=true
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/harness_main_aws
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_ORG=${OPENAI_ORG}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - SECRET_KEY=any-key-you-want
      - ALGORITHM=HS256
      - USE_UNIFIED_RUNNER=true
      - CELERY_WORKER_CONCURRENCY=${CELERY_WORKER_CONCURRENCY:-10}
      - ACCESS_TOKEN_EXPIRE_MINUTES=30
      - DISABLE_AUTH=true
      - AUTO_RECOVER_INTERVAL_SECONDS=600
      - MAX_STEPS_LIMIT=${MAX_STEPS_LIMIT:-400}
      - FIREFOX_CLEANUP_BUFFER_MINUTES=${FIREFOX_CLEANUP_BUFFER_MINUTES:-10}
    volumes:
      - ./results:/app/results
      - ./logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      fastapi-app:
        condition: service_started
      celery-worker:
        condition: service_started
    networks:
      - app-network
    restart: unless-stopped

  # Celery Flower monitoring UI
  flower:
    image: mher/flower:2.0.1
    command: >
      celery --broker=redis://redis:6379/0
             --result-backend=redis://redis:6379/0
             flower
             --port=5555
             --url-prefix=flower
    ports:
      - "5555:5555"
    depends_on:
      redis:
        condition: service_healthy
      celery-worker:
        condition: service_started
    networks:
      - app-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  app-network:
    driver: bridge

