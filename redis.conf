# Redis Configuration for RL Gym Harness
# Optimized for Celery task queue persistence and reliability

# Network and Security
bind 0.0.0.0
port 6379
protected-mode no

# Memory Management
maxmemory 2gb
maxmemory-policy allkeys-lru

# Persistence Configuration - CRITICAL for task queue durability
# Enable RDB snapshots
save 900 1
save 300 10
save 60 10000

# Enable AOF (Append Only File) for maximum durability
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec

# AOF rewrite settings
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# Logging
loglevel notice
logfile ""

# Client settings
timeout 0
tcp-keepalive 300

# Database settings
databases 16

# Slow log settings
slowlog-log-slower-than 10000
slowlog-max-len 128

# Disable dangerous commands in production
rename-command FLUSHDB ""
rename-command FLUSHALL ""
rename-command KEYS ""
rename-command CONFIG "CONFIG_b835729c"

# Performance optimizations
tcp-backlog 511
hz 10

# Memory optimization
hash-max-ziplist-entries 512
hash-max-ziplist-value 64
list-max-ziplist-size -2
list-compress-depth 0
set-max-intset-entries 512
zset-max-ziplist-entries 128
zset-max-ziplist-value 64
