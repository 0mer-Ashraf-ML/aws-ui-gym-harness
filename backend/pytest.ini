[pytest]
# Pytest configuration for FastAPI testing
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function

# Test discovery patterns
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Add project root to Python path
pythonpath = .

# Test paths
testpaths = tests

# Output options
addopts = 
    -v
    --strict-markers
    --tb=short
    --asyncio-mode=auto
    --cov=app
    --cov-report=term-missing
    --cov-report=html
    --cov-report=xml

# Custom markers
markers =
    unit: Unit tests
    integration: Integration tests
    e2e: End-to-end tests
    api: API endpoint tests
    database: Database tests
    celery: Celery task tests
    playwright: Playwright browser tests
    agents: Agent-specific tests (OpenAI, Anthropic, Gemini)
    slow: Slow tests
    mock: Tests with mocked dependencies

